---
aid: arizona-state-university
name: Arizona State University
description: >-
  Arizona State University (ASU) is a large public research university based in
  Tempe, Arizona, United States, ranked #200 in the QS World University Rankings
  2025. ASU's confirmed public developer footprint centers on its Library
  Research Data Repository, a Dataverse instance that exposes a documented native
  REST API and an OAI-PMH metadata interface. ASU also operates a public course
  catalog and class search, a CAS/Shibboleth single sign-on identity service, and
  an official GitHub organization hosting its Unity design system and Drupal-based
  web infrastructure. Most administrative and student-facing APIs are gated behind
  ASURITE authentication and are not publicly documented.
